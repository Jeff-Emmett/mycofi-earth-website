services:
  mycofi-earth-website:
    build:
      context: .
      dockerfile: Dockerfile
    image: mycofi-earth-website:latest
    container_name: mycofi-earth-website
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - INFISICAL_CLIENT_ID=${INFISICAL_CLIENT_ID}
      - INFISICAL_CLIENT_SECRET=${INFISICAL_CLIENT_SECRET}
      - INFISICAL_PROJECT_SLUG=mycofi
    volumes:
      - zine-data:/app/data
    networks:
      - mycofi-network
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mycofi.rule=Host(`mycofi.earth`) || Host(`www.mycofi.earth`) || Host(`zine.mycofi.earth`)"
      - "traefik.http.routers.mycofi.entrypoints=web"
      - "traefik.http.services.mycofi.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-public"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  zine-data:
    driver: local

networks:
  mycofi-network:
    driver: bridge
  traefik-public:
    external: true
